# ──────────────────────────────────────────────────────────────────────────────
# GitHub Actions Workflow: C++ Compilation
#
# Builds the Bioacoustic VAMP Plugin Pack (BirdNET + Perch) as shared libraries
# (.so files) on multiple Ubuntu versions and optionally publishes them as a
# GitHub Release when a version tag is pushed.
# ──────────────────────────────────────────────────────────────────────────────
name: C++ Compilation

# ── Trigger conditions ────────────────────────────────────────────────────────
on:
  push:
    branches: [ main ]       # Run on every push to the main branch
    tags:
      - 'v*'                 # Also run when a version tag is pushed (e.g. v1.0.0)
  pull_request:
    branches: [ main ]       # Run on pull requests targeting main
  workflow_dispatch:         # Allow manual triggering from the Actions tab

# ── Permissions ───────────────────────────────────────────────────────────────
# 'contents: write' is required to create GitHub Releases and upload assets.
permissions:
  contents: write

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  build:
    # Build matrix: compile on three Ubuntu versions in parallel to ensure
    # compatibility across common Linux distributions.
    strategy:
      matrix:
        os: [ubuntu-latest] # [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      # ── Step 1: Check out the repository ────────────────────────────────────
      # Fetches the full repository source so subsequent steps can access all
      # files, including subfolders like birdnet_plugin/ and perch_plugin/.
      - name: Checkout
        uses: actions/checkout@v6

      # ── Step 2: Install build dependencies ──────────────────────────────────
      # Installs the minimum set of packages required to build the plugins:
      #   - cmake:           build system generator
      #   - g++:             C++17 compiler
      #   - vamp-plugin-sdk: headers and shared library for the VAMP interface
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ vamp-plugin-sdk

      # ── Step 3: Compile both VAMP plugins ───────────────────────────────────
      # Runs CMake in Release mode, which enables compiler optimisations (-O3).
      # The CMakeLists.txt at the repo root defines two targets:
      #   - birdnet-vamp  ->  build/birdnet-vamp.so
      #   - perch-vamp    ->  build/perch-vamp.so
      # -j$(nproc) parallelises the build across all available CPU cores.
      - name: Compile on Linux
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      # ── Step 4: Collect all distributable files into a staging folder ────────
      # Gathers the two compiled .so files and the two Python inference scripts
      # into a single 'dist/' directory:
      #   dist/
      #     ├── birdnet-vamp.so
      #     ├── perch-vamp.so
      #     ├── birdnet_run.py
      #     ├── perch_run.py
      #     └── labels.csv
      - name: Prepare Release Files
        run: |
          mkdir dist
          mv build/birdnet-vamp.so dist/birdnet-vamp.so
          mv build/perch-vamp.so dist/perch-vamp.so
          cp birdnet_plugin/birdnet_run.py dist/birdnet_run.py
          cp perch_plugin/perch_run.py dist/perch_run.py
          cp perch_plugin/labels.csv dist/labels.csv

      # ── Step 5: Upload the dist/ folder as a workflow artifact ───────────────
      # upload-artifact zips the folder contents automatically, producing:
      #   bioacoustic-vamp-pack-ubuntu-latest.zip (flat, no subfolders inside)
      # This artifact is available for download from the Actions run summary.
      - name: Upload Plugin Pack
        uses: actions/upload-artifact@v7
        with:
          name: bioacoustic-vamp-pack-${{ matrix.os }}
          path: dist/

      # ── Step 6: Publish GitHub Release ──────────────────────────────────────
      # Only runs when the workflow was triggered by a version tag (e.g. v1.2.0).
      # Creates an explicit .zip (with the OS name) from dist/ and attaches it
      # to the Release. The zip -j flag flattens the paths so there are no
      # subfolders inside the archive.
      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist && zip -j ../bioacoustic-vamp-pack-${{ matrix.os }}.zip *

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body: |
            ## Installation
            Download the zip file matching your Ubuntu version below.
            > Ignore the automatic *Source code (zip)* and *Source code (tar.gz)* archives generated by GitHub — they do not contain the compiled plugins.
          files: bioacoustic-vamp-pack-${{ matrix.os }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
